<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Quotient — AI Quote Generator</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400;1,600&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet">
<link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">

<style>
  .index-shell {
    min-height: 100vh;
    display: grid;
    place-items: center;
    padding: 40px 20px;
  }

  .index-card {
    width: min(500px, 100%);
    text-align: center;
    padding: 52px 44px 44px;
    border: 1px solid rgba(255,255,255,.13);
    border-radius: 6px;
    position: relative;
    background: rgba(255,255,255,.04);
    backdrop-filter: blur(20px);
    -webkit-backdrop-filter: blur(20px);
    animation: riseIn .9s cubic-bezier(.22,1,.36,1) both;
  }

  /* Top hairline warm glow */
  .index-card::before {
    content: '';
    position: absolute;
    top: 0; left: 12%; right: 12%;
    height: 1px;
    background: linear-gradient(90deg, transparent, rgba(212,201,176,.70), transparent);
  }

  .index-card::after {
    content: '';
    position: absolute;
    inset: -1px;
    border-radius: inherit;
    background: radial-gradient(420px 260px at 50% -40px, rgba(212,201,176,.09), transparent 70%);
    pointer-events: none;
  }

  /* ── Wordmark ── */
  .wordmark {
    display: inline-flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
    margin-bottom: 36px;
  }

  .wordmark-label {
    font-family: 'Jost', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: #d4c9b0;           /* warm gold — fully opaque */
  }

  .wordmark-title {
    font-family: 'Cormorant Garamond', Georgia, serif;
    font-weight: 400;
    font-size: 52px;
    line-height: 1;
    letter-spacing: -1px;
    color: #ffffff;            /* pure white for max legibility */
  }

  .wordmark-title em {
    font-style: italic;
    color: #e0d3b8;            /* brighter warm gold */
  }

  /* ── Tagline ── */
  .tagline {
    font-family: 'Jost', sans-serif;
    font-size: 13px;
    font-weight: 300;
    letter-spacing: .3px;
    color: rgba(255,255,255,.72);   /* was .42 — bumped to .72 */
    margin-bottom: 36px;
    line-height: 1.7;
  }

  /* ── Input ── */
  .input-group {
    display: flex;
    flex-direction: column;
    gap: 14px;
    align-items: stretch;
  }

  .input-wrap input {
    width: 100%;
    padding: 14px 18px;
    background: rgba(255,255,255,.06);
    border: 1px solid rgba(255,255,255,.22);   /* stronger border */
    border-radius: 4px;
    color: #ffffff;
    font-family: 'Jost', sans-serif;
    font-size: 14px;
    font-weight: 300;
    letter-spacing: .3px;
    outline: none;
    transition: border-color .22s, box-shadow .22s;
    caret-color: #e0d3b8;
  }

  .input-wrap input::placeholder {
    color: rgba(255,255,255,.48);    /* was .25 — now .48 */
    font-style: italic;
    font-family: 'Cormorant Garamond', serif;
    font-size: 16px;
  }

  .input-wrap input:focus {
    border-color: rgba(224,211,184,.65);
    box-shadow: 0 0 0 4px rgba(212,201,176,.10);
  }

  /* ── OR divider ── */
  .or-divider {
    display: flex;
    align-items: center;
    gap: 12px;
    color: rgba(255,255,255,.55);    /* was .18 — now .55 */
    font-family: 'Jost', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 2.5px;
    text-transform: uppercase;
  }

  .or-divider::before,
  .or-divider::after {
    content: '';
    flex: 1;
    height: 1px;
    background: rgba(255,255,255,.18);  /* was .09 — doubled */
  }

  /* ── Suggestion chips ── */
  .suggestions {
    display: flex;
    flex-wrap: wrap;
    gap: 8px;
    justify-content: center;
  }

  .suggestion-chip {
    font-family: 'Jost', sans-serif;
    font-size: 10px;
    font-weight: 500;
    letter-spacing: 1.5px;
    text-transform: uppercase;
    color: rgba(255,255,255,.78);    /* was .40 — now .78 */
    border: 1px solid rgba(255,255,255,.22);  /* was .09 */
    background: transparent;
    padding: 6px 14px;
    border-radius: 999px;
    cursor: pointer;
    transition: color .2s, border-color .2s, background .2s;
  }

  .suggestion-chip:hover {
    color: #ffffff;
    border-color: rgba(212,201,176,.65);
    background: rgba(212,201,176,.09);
  }

  /* ── Submit button ── */
  .submit-btn {
    position: relative;
    width: 100%;
    padding: 15px 24px;
    background: #f0ebe0;
    border: none;
    border-radius: 4px;
    color: #0c0c0b;
    font-family: 'Jost', sans-serif;
    font-size: 11px;
    font-weight: 600;
    letter-spacing: 3px;
    text-transform: uppercase;
    cursor: pointer;
    overflow: hidden;
    transition: background .22s, transform .18s;
  }

  .submit-btn:hover {
    background: #d4c9b0;
    transform: translateY(-1px);
  }

  .submit-btn:active { transform: translateY(0); }

  .submit-btn::after {
    content: '';
    position: absolute;
    inset: 0;
    background: linear-gradient(105deg,
      transparent 35%, rgba(255,255,255,.30) 50%, transparent 65%);
    transform: translateX(-100%);
    transition: transform .55s ease;
  }

  .submit-btn:hover::after { transform: translateX(100%); }

  /* ── Footer ── */
  .index-footer {
    margin-top: 40px;
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 14px;
    color: rgba(255,255,255,.45);    /* was .18 — now .45 */
    font-family: 'Jost', sans-serif;
    font-size: 10px;
    font-weight: 400;
    letter-spacing: 2px;
    text-transform: uppercase;
  }

  .dot {
    width: 3px; height: 3px;
    border-radius: 50%;
    background: rgba(255,255,255,.35);
  }

  @keyframes riseIn {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  @media (max-width: 540px) {
    .index-card { padding: 40px 24px 36px; }
  }
</style>
</head>

<body>
<main class="index-shell">
  <div class="index-card">

    <div class="wordmark">
      <span class="wordmark-label">Generate Your Quote</span>
      <h1 class="wordmark-title">Quot<em>ient</em></h1>
    </div>

    <p class="tagline">
      Type a subject. Let inspiration flow<br>
      
    </p>

    <form class="input-group" action="/generate" method="POST">
      <div class="input-wrap">
        <input
          type="text"
          name="topic"
          id="topic"
          placeholder="Solitude, ambition, time…"
          autocomplete="off"
          required
        >
      </div>

      <div class="or-divider">or choose a topic</div>

      <div class="suggestions" role="group" aria-label="Topic suggestions">
        <button type="button" class="suggestion-chip" data-topic="Resilience">Resilience</button>
        <button type="button" class="suggestion-chip" data-topic="Solitude">Solitude</button>
        <button type="button" class="suggestion-chip" data-topic="Ambition">Ambition</button>
        <button type="button" class="suggestion-chip" data-topic="Time">Time</button>
        <button type="button" class="suggestion-chip" data-topic="Creativity">Creativity</button>
        <button type="button" class="suggestion-chip" data-topic="Failure">Failure</button>
      </div>

      <button type="submit" class="submit-btn">Generate Quotes</button>
    </form>

    <footer class="index-footer">
      <span>Think · Type · Inspire</span>
    </footer>

  </div>
</main>

<script>
  document.querySelectorAll(".suggestion-chip").forEach(chip => {
    chip.addEventListener("click", () => {
      const input = document.getElementById("topic");
      input.value = chip.dataset.topic;
      input.focus();
    });
  });
</script>
</body>
</html>
